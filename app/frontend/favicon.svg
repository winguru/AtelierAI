      <stop offset="0%" stop-color="#e06830"/>
      <stop offset="100%" stop-color="#a83f19"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffdf9"/>
