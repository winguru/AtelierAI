services:
  atelier-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    working_dir: /workspace
    command: ["tail", "-f", "/dev/null"]
    init: true
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
    environment:
      PYTHONPATH: /workspace/app:/workspace/app/src:/workspace/app/backend:/workspace/app/dev
      IMAGE_LIBRARY_PATH: /workspace/app/image_library
      IMAGE_RESOURCES_PATH: /workspace/app/image_resources
      DATABASE_URL: sqlite:////workspace/app/image_db.sqlite
      ATELIER_HOST: 0.0.0.0
      ATELIER_PORT: 8000
      ATELIER_RELOAD: 1
      ATELIER_SUPPRESS_STATUS_GET_LOGS: ${ATELIER_SUPPRESS_STATUS_GET_LOGS:-1}

  atelier-runtime:
    profiles: ["runtime"]
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    ports:
      - "8000:8000"
    volumes:
      - atelier-runtime-data:/var/lib/atelierai
      - ./image_library:/var/lib/atelierai/image_library
      - ./image_resources:/var/lib/atelierai/image_resources
    environment:
      IMAGE_LIBRARY_PATH: /var/lib/atelierai/image_library
      IMAGE_RESOURCES_PATH: /var/lib/atelierai/image_resources
      DATABASE_URL: sqlite:////var/lib/atelierai/image_db.sqlite
      ATELIER_HOST: 0.0.0.0
      ATELIER_PORT: 8000
      ATELIER_RELOAD: 0
      ATELIER_SUPPRESS_STATUS_GET_LOGS: ${ATELIER_SUPPRESS_STATUS_GET_LOGS:-1}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  atelier-runtime-data:
